apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-dependencies-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - name: cluster-dependencies
            branch: main
  template:
    metadata:
      name: '{{name}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/initech-ai/Initech-config.git
        targetRevision: '{{branch}}'
        path: cluster-dependencies/applications
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
