apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recipe-api-{{ .Values.branch }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.branch }}
    path: services/recipe-api/templates
  destination:
    server: https://kubernetes.default.svc
    namespace: recipe-api-{{ .Values.branch }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
