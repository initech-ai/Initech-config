---
# Source: apps/templates/ramen-ui.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ramen-ui-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/initech-ai/Initech-config.git
    targetRevision: env/dev
    path: services/ramen-ui/templates
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
